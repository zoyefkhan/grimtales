<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — GrimTales</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <style>
    .page-notifs { padding-top: 70px; min-height: 100vh; }
    .notifs-layout { max-width: 760px; margin: 0 auto; padding: 3rem 1rem; }
    .notifs-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    .notifs-title { font-family: var(--font-display); font-size: 1.6rem; color: var(--white); }
    .notifs-actions { display: flex; gap: 0.75rem; }
    .notifs-filter-bar {
      display: flex;
      gap: 0.25rem;
      background: var(--charcoal-mid);
      border-radius: var(--radius);
      padding: 3px;
      margin-bottom: 1.5rem;
    }
    .notif-filter-btn {
      flex: 1;
      padding: 0.5em;
      font-family: var(--font-heading);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 3px;
      background: transparent;
      border: none;
      color: var(--ash);
      cursor: pointer;
      transition: var(--transition);
    }
    .notif-filter-btn.active { background: var(--charcoal-light); color: var(--white); }
    .notifs-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .notif-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1.1rem 1.25rem;
      background: var(--charcoal);
      border: var(--border-subtle);
      border-radius: var(--radius-lg);
      transition: var(--transition);
      cursor: pointer;
      position: relative;
    }
    .notif-item.unread { border-left: 3px solid var(--crimson); background: rgba(139,26,26,0.04); }
    .notif-item:hover { border-color: rgba(139,26,26,0.4); }
    .notif-icon {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--charcoal-mid);
      border: var(--border-subtle);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .notif-icon.chapter { background: rgba(40,100,180,0.1); border-color: rgba(40,100,180,0.2); }
    .notif-icon.comment { background: rgba(93,186,125,0.08); border-color: rgba(93,186,125,0.15); }
    .notif-icon.follow { background: rgba(139,26,26,0.1); border-color: rgba(139,26,26,0.2); }
    .notif-icon.rating { background: rgba(201,168,76,0.1); border-color: rgba(201,168,76,0.2); }
    .notif-icon.system { background: rgba(150,100,200,0.08); border-color: rgba(150,100,200,0.15); }
    .notif-body { flex: 1; min-width: 0; }
    .notif-text { font-size: 0.88rem; color: var(--ash-light); line-height: 1.5; }
    .notif-text strong { color: var(--white); }
    .notif-text a { color: var(--crimson-glow); }
    .notif-time { font-size: 0.72rem; color: var(--ash); margin-top: 0.3rem; font-family: var(--font-heading); }
    .notif-unread-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--crimson); flex-shrink: 0;
      margin-top: 0.4rem;
    }
    .notif-day-label {
      font-family: var(--font-heading);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ash);
      padding: 0.5rem 0;
      margin-top: 0.5rem;
    }
    .notifs-empty {
      text-align: center;
      padding: 5rem 2rem;
      background: var(--charcoal);
      border: var(--border-subtle);
      border-radius: var(--radius-lg);
    }
  </style>
  <link rel="stylesheet" href="css/notifications.css" />
</head>
<body class="page-notifs">

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo">
        <div class="logo-icon"></div>
        <span class="logo-text">Grim<span>Tales</span></span>
      </a>
      <ul class="navbar-nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="browse.html">Browse</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
      </ul>
      <div class="navbar-actions">
        <button class="theme-toggle" id="themeToggle">🌙</button>
        
      </div>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </nav>
  <div class="mobile-nav" id="mobileNav">
    <a href="index.html">🏠 Home</a>
    <a href="user-profile.html">👤 Profile</a>
  </div>

  <div class="page-notifs">
    <div class="notifs-layout">
      <div class="notifs-header">
        <div>
          <h1 class="notifs-title">Notifications</h1>
          <div style="font-size:0.82rem;color:var(--ash);margin-top:0.25rem"><span id="unreadCount" style="color:var(--crimson-glow);font-family:var(--font-heading)">0</span> unread</div>
        </div>
        <div class="notifs-actions">
          <button class="btn btn-outline" id="markAllRead">✓ Mark all read</button>
          <a href="settings.html#notifications" class="btn btn-outline">⚙ Settings</a>
        </div>
      </div>

      <div class="notifs-filter-bar">
        <button class="notif-filter-btn active" data-filter="all">All</button>
        <button class="notif-filter-btn" data-filter="chapters">Chapters</button>
        <button class="notif-filter-btn" data-filter="comments">Comments</button>
        <button class="notif-filter-btn" data-filter="follows">Follows</button>
        <button class="notif-filter-btn" data-filter="system">System</button>
      </div>

      <div class="notifs-list" id="notifsList"></div>

      <div style="text-align:center;margin-top:2rem">
        <button class="btn btn-outline" id="loadMoreNotifs">Load More</button>
      </div>
    </div>
  </div>

  <script src="js/supabase.js"></script>   <!-- ← ADD THIS LINE -->
  <script src="js/auth-guard.js"></script>
  <script src="js/loading.js"></script>
  <script src="js/app.js"></script>
  <script src="js/notifications.js"></script>
</body>
</html>
