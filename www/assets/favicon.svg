<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b1a1a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" fill="#0a0a0b" rx="12"/>
  <!-- Glow -->
  <circle cx="32" cy="32" r="28" fill="url(#glow)"/>
  <!-- Hexagon shape -->
  <polygon
    points="32,6 54,19 54,45 32,58 10,45 10,19"
    fill="#8b1a1a"
    stroke="#c0392b"
    stroke-width="1.5"
  />
  <!-- Star symbol -->
  <text
    x="32"
    y="40"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="22"
    fill="#f0eee8"
    font-weight="bold"
  >✦</text>
</svg>
