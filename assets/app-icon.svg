<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="app-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16161a" />
      <stop offset="100%" stop-color="#070708" />
    </linearGradient>

    <filter id="gothic-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#000000" flood-opacity="0.9" />
    </filter>

    <linearGradient id="metal-bright" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d66" />
      <stop offset="30%" stop-color="#ff0526" />
      <stop offset="70%" stop-color="#8f0013" />
      <stop offset="100%" stop-color="#380006" />
    </linearGradient>

    <linearGradient id="metal-dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5c000c" />
      <stop offset="50%" stop-color="#210003" />
      <stop offset="100%" stop-color="#0a0001" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#app-bg)" rx="112" />
  
  <rect x="1" y="1" width="510" height="510" fill="none" stroke="#222226" stroke-width="2" rx="111" />

  <g filter="url(#gothic-shadow)" transform="translate(256, 252) scale(1.05)">
    
    <g id="outer-ring">
      <path d="M -115 -75 A 140 140 0 0 0 -140 0 L -115 0 A 115 115 0 0 1 -95 -60 Z" fill="url(#metal-dark)" />
      <path d="M -95 -60 A 115 115 0 0 1 0 -115 L 0 -140 A 140 140 0 0 0 -115 -75 Z" fill="url(#metal-bright)" />
      <path d="M 0 -140 A 140 140 0 0 0 115 -75 L 95 -60 A 115 115 0 0 1 0 -115 Z" fill="url(#metal-bright)" />
      <path d="M 95 -60 A 115 115 0 0 1 115 0 L 140 0 A 140 140 0 0 0 115 -75 Z" fill="url(#metal-dark)" />
      <path d="M 140 0 A 140 140 0 0 0 115 75 L 95 60 A 115 115 0 0 1 115 0 Z" fill="url(#metal-bright)" />
      <path d="M 95 60 A 115 115 0 0 1 0 115 L 0 140 A 140 140 0 0 0 115 75 Z" fill="url(#metal-dark)" />
      <path d="M 0 140 A 140 140 0 0 0 -115 75 L -95 60 A 115 115 0 0 1 0 115 Z" fill="url(#metal-dark)" />
      <path d="M -95 60 A 115 115 0 0 1 -115 0 L -140 0 A 140 140 0 0 0 -115 75 Z" fill="url(#metal-bright)" />
    </g>

    <g id="diagonal-spikes">
      <path d="M 0 0 L -70 -70 L -55 -90 Z" fill="url(#metal-bright)" />
      <path d="M 0 0 L -70 -70 L -90 -55 Z" fill="url(#metal-dark)" />
      <path d="M 0 0 L 70 -70 L 90 -55 Z" fill="url(#metal-bright)" />
      <path d="M 0 0 L 70 -70 L 55 -90 Z" fill="url(#metal-dark)" />
      <path d="M 0 0 L 70 70 L 55 90 Z" fill="url(#metal-bright)" />
      <path d="M 0 0 L 70 70 L 90 55 Z" fill="url(#metal-dark)" />
      <path d="M 0 0 L -70 70 L -90 55 Z" fill="url(#metal-bright)" />
      <path d="M 0 0 L -70 70 L -55 90 Z" fill="url(#metal-dark)" />
    </g>

    <g id="main-spikes">
      <path d="M 0 -220 L -25 -110 L 0 -130 Z" fill="url(#metal-bright)" />
      <path d="M 0 -220 L 25 -110 L 0 -130 Z" fill="url(#metal-dark)" />
      <path d="M 0 240 L -25 110 L 0 130 Z" fill="url(#metal-bright)" />
      <path d="M 0 240 L 25 110 L 0 130 Z" fill="url(#metal-dark)" />
      <path d="M -210 0 L -110 -22 L -125 0 Z" fill="url(#metal-bright)" />
      <path d="M -210 0 L -110 22 L -125 0 Z" fill="url(#metal-dark)" />
      <path d="M 210 0 L 110 -22 L 125 0 Z" fill="url(#metal-bright)" />
      <path d="M 210 0 L 110 22 L 125 0 Z" fill="url(#metal-dark)" />
    </g>

    <g id="gothic-raven">
      <path d="M -5 -95 C 15 -95 35 -85 55 -70 L 35 -60 C 25 -65 10 -70 -5 -70 Z" fill="url(#metal-bright)" />
      <path d="M -5 -95 C -20 -95 -35 -85 -45 -70 L -25 -65 C -15 -70 -5 -70 -5 -70 Z" fill="url(#metal-dark)" />
      <path d="M 55 -70 L 72 -63 L 35 -60 Z" fill="url(#metal-bright)" />
      <path d="M -5 -70 L -115 -20 L -60 -10 Z" fill="url(#metal-dark)" />
      <path d="M -5 -40 L -145 0 L -55 15 Z" fill="url(#metal-dark)" />
      <path d="M -5 -10 L -100 35 L -45 35 Z" fill="url(#metal-dark)" />
      <path d="M -5 -70 L 115 -20 L 60 -10 Z" fill="url(#metal-bright)" />
      <path d="M -5 -40 L 145 0 L 55 15 Z" fill="url(#metal-bright)" />
      <path d="M -5 -10 L 100 35 L 45 35 Z" fill="url(#metal-bright)" />
      <path d="M -5 -70 L -5 50 L -55 15 Z" fill="url(#metal-dark)" />
      <path d="M -5 -70 L 50 15 L -5 50 Z" fill="url(#metal-bright)" />
      <path d="M -5 -70 L 0 -40 L -5 50 Z" fill="#ff4d6d" opacity="0.25" />
      <path d="M -5 50 L -25 110 L -5 80 Z" fill="url(#metal-dark)" />
      <path d="M -5 50 L 5 80 L 15 110 Z" fill="url(#metal-bright)" />
      <path d="M -5 50 L -10 135 L -5 85 Z" fill="url(#metal-dark)" />
      <path d="M -5 50 L -5 85 L 0 135 Z" fill="url(#metal-bright)" />
    </g>
  </g>
</svg>