<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0808" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0a0b" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="crimson-glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#8b1a1a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b1a1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-glow)"/>
  <rect width="1200" height="630" fill="url(#crimson-glow)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#8b1a1a" stroke-width="0.3" opacity="0.3"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Border frame -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#8b1a1a" stroke-width="1" opacity="0.4" rx="8"/>
  <rect x="48" y="48" width="1104" height="534" fill="none" stroke="#8b1a1a" stroke-width="0.5" opacity="0.2" rx="6"/>

  <!-- Corner ornaments -->
  <text x="52" y="82" font-family="Georgia,serif" font-size="24" fill="#8b1a1a" opacity="0.6">✦</text>
  <text x="1124" y="82" font-family="Georgia,serif" font-size="24" fill="#8b1a1a" opacity="0.6">✦</text>
  <text x="52" y="600" font-family="Georgia,serif" font-size="24" fill="#8b1a1a" opacity="0.6">✦</text>
  <text x="1124" y="600" font-family="Georgia,serif" font-size="24" fill="#8b1a1a" opacity="0.6">✦</text>

  <!-- Hex logo -->
  <polygon points="600,140 640,162 640,206 600,228 560,206 560,162" fill="#8b1a1a" stroke="#c0392b" stroke-width="2"/>
  <text x="600" y="198" text-anchor="middle" font-family="Georgia,serif" font-size="40" fill="#f0eee8">✦</text>

  <!-- Main title -->
  <text x="600" y="300" text-anchor="middle" font-family="Georgia,serif" font-size="72" font-weight="bold" fill="#f0eee8" letter-spacing="8">GrimTales</text>

  <!-- Divider line -->
  <line x1="400" y1="325" x2="800" y2="325" stroke="#8b1a1a" stroke-width="1" opacity="0.6"/>

  <!-- Tagline -->
  <text x="600" y="370" text-anchor="middle" font-family="Georgia,serif" font-size="20" fill="#9a9aaa" letter-spacing="6">WHERE DARKNESS TELLS ITS STORY</text>

  <!-- Stats -->
  <text x="320" y="470" text-anchor="middle" font-family="Georgia,serif" font-size="36" font-weight="bold" fill="#c0392b">12K+</text>
  <text x="320" y="500" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#9a9aaa" letter-spacing="3">NOVELS</text>

  <text x="600" y="470" text-anchor="middle" font-family="Georgia,serif" font-size="36" font-weight="bold" fill="#c0392b">340K</text>
  <text x="600" y="500" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#9a9aaa" letter-spacing="3">READERS</text>

  <text x="880" y="470" text-anchor="middle" font-family="Georgia,serif" font-size="36" font-weight="bold" fill="#c0392b">FREE</text>
  <text x="880" y="500" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#9a9aaa" letter-spacing="3">FOREVER</text>

  <!-- Stat dividers -->
  <line x1="460" y1="450" x2="460" y2="510" stroke="#3a3a44" stroke-width="1"/>
  <line x1="740" y1="450" x2="740" y2="510" stroke="#3a3a44" stroke-width="1"/>

  <!-- URL -->
  <text x="600" y="565" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#6a6a7a" letter-spacing="2">grimtales.com</text>
</svg>
