<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Novels — GrimTales</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/browse.css" />
</head>
<body class="page-browse">

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo">
        <div class="logo-icon"></div>
        <span class="logo-text">Grim<span>Tales</span></span>
      </a>
      <ul class="navbar-nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="browse.html" class="active">Browse</a></li>
        <li><a href="index.html#genres">Genres</a></li>
        <li><a href="dashboard.html">Write</a></li>
      </ul>
      <div class="navbar-actions">
        <button class="theme-toggle" id="themeToggle">🌙</button>
        <a href="login.html" class="btn btn-outline" style="font-size:0.75rem;padding:0.5em 1.2em;">Sign In</a>
        <a href="register.html" class="btn btn-crimson" style="font-size:0.75rem;padding:0.5em 1.2em;">Join</a>
      </div>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </nav>
  <div class="mobile-nav" id="mobileNav">
    <a href="index.html">🏠 Home</a>
    <a href="browse.html">📚 Browse</a>
    <a href="login.html">👤 Sign In</a>
  </div>

  <!-- BROWSE HERO -->
  <section class="browse-hero">
    <div class="browse-hero-inner container">
      <h1 class="browse-title">Browse the Archives</h1>
      <p class="browse-subtitle">12,480 novels spanning every shade of darkness</p>
      <div class="browse-search-bar">
        <input type="text" placeholder="Search by title, author, or tag..." id="browseSearch" />
        <button class="btn btn-crimson" id="searchBtn">Search</button>
      </div>
    </div>
  </section>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="container filter-bar-inner">
      <span class="filter-label">Genre:</span>
      <div class="filter-chips">
        <button class="filter-chip active" data-genre="all">All</button>
        <button class="filter-chip" data-genre="dark-fantasy">Dark Fantasy</button>
        <button class="filter-chip" data-genre="horror">Horror</button>
        <button class="filter-chip" data-genre="gothic">Gothic</button>
        <button class="filter-chip" data-genre="supernatural">Supernatural</button>
        <button class="filter-chip" data-genre="mystery">Mystery</button>
        <button class="filter-chip" data-genre="apocalyptic">Apocalyptic</button>
        <button class="filter-chip" data-genre="vampire">Vampire</button>
        <button class="filter-chip" data-genre="psychological">Psychological</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-sort">
        <span class="filter-label">Sort:</span>
        <select id="sortSelect">
          <option value="trending">Trending</option>
          <option value="new">New</option>
          <option value="rating">Top Rated</option>
          <option value="views">Most Read</option>
          <option value="updated">Recently Updated</option>
        </select>
      </div>
    </div>
  </div>

  <!-- BROWSE LAYOUT -->
  <div class="container">
    <div class="browse-layout">
      <!-- Sidebar Filters -->
      <aside class="browse-sidebar">
        <div class="filter-panel">
          <div class="filter-panel-header">
            <span class="filter-panel-title">Filters</span>
            <button class="filter-reset" id="resetFilters">Reset All</button>
          </div>

          <!-- Status -->
          <div class="filter-group">
            <div class="filter-group-title">Status</div>
            <div class="filter-options">
              <label class="filter-option">
                <div class="filter-checkbox"></div>
                <span class="filter-option-label">Ongoing</span>
                <span class="filter-option-count">7,240</span>
              </label>
              <label class="filter-option checked">
                <div class="filter-checkbox"></div>
                <span class="filter-option-label">Completed</span>
                <span class="filter-option-count">4,120</span>
              </label>
              <label class="filter-option">
                <div class="filter-checkbox"></div>
                <span class="filter-option-label">On Hiatus</span>
                <span class="filter-option-count">1,120</span>
              </label>
            </div>
          </div>

          <!-- Rating -->
          <div class="filter-group">
            <div class="filter-group-title">Minimum Rating</div>
            <div class="filter-rating-row">
              <button class="rating-star-btn active" data-rating="1">★</button>
              <button class="rating-star-btn active" data-rating="2">★</button>
              <button class="rating-star-btn active" data-rating="3">★</button>
              <button class="rating-star-btn active" data-rating="4">★</button>
              <button class="rating-star-btn" data-rating="5">★</button>
            </div>
          </div>

          <!-- Chapters -->
          <div class="filter-group">
            <div class="filter-group-title">Chapter Count</div>
            <div class="filter-options">
              <label class="filter-option">
                <div class="filter-checkbox"></div>
                <span class="filter-option-label">Short (1–50)</span>
              </label>
              <label class="filter-option">
                <div class="filter-checkbox"></div>
                <span class="filter-option-label">Medium (50–200)</span>
              </label>
              <label class="filter-option">
                <div class="filter-checkbox"></div>
                <span class="filter-option-label">Long (200–500)</span>
              </label>
              <label class="filter-option">
                <div class="filter-checkbox"></div>
                <span class="filter-option-label">Epic (500+)</span>
              </label>
            </div>
          </div>

          <!-- Tags -->
          <div class="filter-group">
            <div class="filter-group-title">Popular Tags</div>
            <div style="display:flex;flex-wrap:wrap;gap:0.35rem">
              <button class="filter-chip active" style="border-radius:3px">Anti-Hero</button>
              <button class="filter-chip" style="border-radius:3px">Dark MC</button>
              <button class="filter-chip" style="border-radius:3px">Magic System</button>
              <button class="filter-chip" style="border-radius:3px">Slow Burn</button>
              <button class="filter-chip" style="border-radius:3px">Redemption</button>
              <button class="filter-chip" style="border-radius:3px">Tragedy</button>
              <button class="filter-chip" style="border-radius:3px">Revenge</button>
              <button class="filter-chip" style="border-radius:3px">Found Family</button>
            </div>
          </div>
        </div>
      </aside>

      <!-- Results -->
      <main>
        <div class="browse-results-header">
          <div class="results-count"><span id="resultsCount">12,480</span> novels found</div>
          <div class="view-toggle">
            <button class="view-btn active" data-view="grid" title="Grid view">⊞</button>
            <button class="view-btn" data-view="list" title="List view">☰</button>
          </div>
        </div>

        <!-- Grid View -->
        <div class="novels-grid" id="novelsGrid">
          <!-- Injected by browse.js -->
        </div>

        <!-- List View (hidden by default) -->
        <div class="novels-list-view" id="novelsList" style="display:none">
          <!-- Injected by browse.js -->
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination">
          <button class="page-btn disabled" id="prevPage">‹</button>
          <button class="page-btn active">1</button>
          <button class="page-btn">2</button>
          <button class="page-btn">3</button>
          <span style="color:var(--ash);padding:0 0.25rem">...</span>
          <button class="page-btn">84</button>
          <button class="page-btn" id="nextPage">›</button>
        </div>
      </main>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/browse.js"></script>
</body>
</html>
