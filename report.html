<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report Content — GrimTales</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <style>
    .page-report { padding-top:70px; min-height:100vh; }
    .form-group { display:flex; flex-direction:column; gap:0.4rem; margin-bottom:1.25rem; }
    .form-label { font-family:var(--font-heading); font-size:0.72rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--ash); }
    .report-form { background:var(--metal-card); border:var(--border-subtle); border-radius:var(--radius-lg); padding:2rem; max-width:640px; }
    .reason-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; margin-bottom:1.25rem; }
    .reason-btn { padding:0.75em 1em; background:var(--metal-card); border:var(--border-subtle); border-radius:var(--radius); color:var(--ash-light); font-family:var(--font-heading); font-size:0.75rem; letter-spacing:0.05em; cursor:pointer; transition:var(--transition); text-align:left; }
    .reason-btn:hover, .reason-btn.active { border-color:var(--crimson); color:var(--crimson-glow); background:rgba(139,26,26,0.08); }
  </style>
</head>
<body class="page-report">
  <script src="js/loading.js"></script>
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo"><div class="logo-icon"></div><span class="logo-text">Grim<span>Tales</span></span></a>
      <div class="navbar-actions"><button class="theme-toggle" id="themeToggle">🌙</button></div>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="container" style="padding:3rem 0;max-width:700px">
    <div style="margin-bottom:2rem">
      <div style="font-family:var(--font-heading);font-size:0.72rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--crimson-glow);margin-bottom:0.75rem">Safety</div>
      <h1 style="font-family:var(--font-display);font-size:1.8rem;color:var(--white);margin-bottom:0.5rem">Report Content</h1>
      <p style="color:var(--ash)">Help us keep GrimTales safe. All reports are reviewed within 4 hours.</p>
    </div>

    <div class="report-form">
      <div class="form-group"><label class="form-label">Content URL or Title</label><input type="text" id="reportUrl" placeholder="Paste the novel/chapter URL or name" /></div>
      <div class="form-label" style="margin-bottom:0.75rem">Reason for Report</div>
      <div class="reason-grid">
        <button class="reason-btn" data-reason="Hate speech or discrimination">⚠️ Hate speech</button>
        <button class="reason-btn" data-reason="Sexual content involving minors">🚫 Minors in sexual content</button>
        <button class="reason-btn" data-reason="Graphic violence or gore">🔴 Graphic violence</button>
        <button class="reason-btn" data-reason="Harassment or bullying">😡 Harassment</button>
        <button class="reason-btn" data-reason="Copyright infringement">©️ Copyright violation</button>
        <button class="reason-btn" data-reason="Spam or misleading content">📢 Spam / Misleading</button>
        <button class="reason-btn" data-reason="Self-harm or suicide content">💙 Self-harm content</button>
        <button class="reason-btn" data-reason="Other reason">📝 Other</button>
      </div>
      <div class="form-group"><label class="form-label">Additional Details</label><textarea id="reportDetails" style="min-height:120px;resize:vertical" placeholder="Describe the issue in detail. Include chapter numbers if relevant..."></textarea></div>
      <div class="form-group"><label class="form-label">Your Email (optional)</label><input type="email" id="reportEmail" placeholder="So we can follow up with you" /></div>
      <button class="btn btn-crimson" id="submitReport" style="width:100%;justify-content:center">Submit Report →</button>
      <p style="font-size:0.75rem;color:var(--ash);margin-top:1rem;text-align:center">Reports are anonymous by default. We take all reports seriously.</p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    let selectedReason = '';
    document.querySelectorAll('.reason-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.reason-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedReason = btn.dataset.reason;
      });
    });
    document.getElementById('submitReport').addEventListener('click', () => {
      const url = document.getElementById('reportUrl').value.trim();
      const details = document.getElementById('reportDetails').value.trim();
      if (!url) { window.showToast('Please enter the content URL or title.', 'error'); return; }
      if (!selectedReason) { window.showToast('Please select a reason.', 'error'); return; }
      if (!details) { window.showToast('Please add some details.', 'error'); return; }
      window.showToast('Report submitted. Our team will review it within 4 hours. ✦');
      setTimeout(() => window.location.href = 'index.html', 2000);
    });
  </script>
</body>
</html>
